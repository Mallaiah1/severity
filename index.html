<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦚 Everything maya..</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="data.js"></script>

    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.12); 
            --border: rgba(255, 255, 255, 0.25); 
            --whatsapp: #25D366;
            --accent: #e73c7e;
        }

        /* --- UI LOCK --- */
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- WELCOME TOAST --- */
        #welcome-toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            color: white; padding: 12px 25px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; z-index: 10000;
            border: 1px solid rgba(255,255,255,0.2); width: max-content;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #welcome-toast.show { bottom: 30px; }

        /* --- CLEAN FLOATING IMAGES (RIGHT FLIPPED) --- */
        @keyframes floatLeft { 
            0%, 100% { transform: translateY(0) rotate(5deg); } 
            50% { transform: translateY(-15px) rotate(7deg); } 
        }

        @keyframes floatRight { 
            0%, 100% { transform: translateY(0) rotate(-5deg) scaleX(-1); } 
            50% { transform: translateY(-20px) rotate(-3deg) scaleX(-1); } 
        }

        .side-img { 
            position: fixed; width: clamp(100px, 20vw, 220px); z-index: 1; pointer-events: none; 
            background: transparent !important; mix-blend-mode: normal !important; filter: none !important;
        }
        .img-left { left: 5%; bottom: 10%; animation: floatLeft 7s ease-in-out infinite; }
        .img-right { right: 5%; top: 10%; animation: floatRight 9s ease-in-out infinite; }

        /* --- MARQUEE --- */
        .marquee-container { width: 100%; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); padding: 10px 0; overflow: hidden; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .marquee-content { display: inline-block; white-space: nowrap; animation: scroll 30s linear infinite; }
        .marquee-container:hover .marquee-content { animation-play-state: paused; }
        .marquee-content span { color: white; font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; padding-right: 50px; }
        @keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        /* --- MAIN UI CARD --- */
        .main-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; }
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--border); border-radius: 30px; padding: clamp(25px, 8vw, 45px); 
            width: 100%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.15); z-index: 10; 
        }

        h2 { color: white; letter-spacing: 3px; font-weight: 400; font-size: clamp(0.6rem, 2vw, 0.75rem); margin-bottom: 25px; }

        .input-box { position: relative; width: 100%; margin-bottom: 12px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 16px; }
        
        /* --- SUGGESTIONS (NO SCROLLBAR + HOVER EFFECT) --- */
        .suggest-panel { 
            position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; 
            z-index: 1000; max-height: 180px; overflow-y: auto; display: none; margin-top: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .suggest-panel::-webkit-scrollbar { display: none; }

        .suggest-item { 
            padding: 14px 18px; cursor: pointer; color: #444; font-weight: 700; font-size: 0.8rem; 
            text-align: left; border-bottom: 1px solid #f0f0f0; transition: all 0.2s ease; 
        }
        .suggest-item:hover { 
            background: #f8f8f8; color: var(--accent); padding-left: 25px; 
        }

        .btn-analyze { width: 100%; padding: 16px; border-radius: 50px; border: none; cursor: pointer; font-weight: 900; background: white; color: #111; letter-spacing: 2px; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

        /* --- FOOTER & WHATSAPP --- */
        .footer { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: auto; }
        .wa-link { display: flex; align-items: center; gap: 8px; color: white; text-decoration: none; font-size: clamp(0.65rem, 2vw, 0.75rem); font-weight: 800; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; transition: 0.4s; }
        .wa-link:hover { background: var(--whatsapp); transform: scale(1.08) translateY(-5px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4); }
        .copyright-bar { width: 100%; background: rgba(0,0,0,0.3); padding: 12px; color: rgba(255,255,255,0.4); font-size: 0.5rem; text-align: center; }

        /* --- RESULT STATES --- */
        .res-code { color: white; font-size: clamp(3rem, 15vw, 5.5rem); font-weight: 900; margin: 10px 0; line-height: 1; }
        #loader { display: none; margin: 20px auto; }
        .spinner { width: 35px; height: 35px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #result-display { display: none; flex-direction: column; align-items: center; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .searching .input-box, .searching .btn-analyze, .searching h2 { display: none; }
        .searching #loader { display: block; }
        .active .input-box, .active .btn-analyze, .active h2, .active #loader { display: none; }
        .active #result-display { display: flex; }

        @media (max-width: 600px) {
            .side-img { width: 80px; opacity: 0.6; }
            .img-left { left: 10px; }
            .img-right { right: 10px; }
        }
    </style>
</head>
<body>

    <div id="welcome-toast">
        <i data-lucide="shield-check" size="18" style="color:#23d5ab"></i>
        <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;">Hello! Thanks for joining us.</span>
    </div>

    <div class="marquee-container">
        <div class="marquee-content">
            <span>Asthma + COPD + Chronic bronchoits + Bronchetits = J44.89</span>
            <span>DESIGNED BY ABC • SAVE TIME • REDUCE ERRORS • 2026 EDITION • ACCURATE CODING • </span>
        </div>
    </div>

    <img src="img1.png" class="side-img img-left" alt="">
    <img src="left.png" class="side-img img-right" alt="">

    <div class="main-wrapper">
        <div class="glass-card" id="mainCard">
            <h2><b> Search Severity </b></h2>
            <div id="loader"><div class="spinner"></div></div>

            <div class="input-box">
                <input type="text" id="diag1" placeholder="Primary Diagnosis..." oninput="showSuggestions(this, 'list1')" autocomplete="off">
                <div id="list1" class="suggest-panel"></div>
            </div>

            <div class="input-box">
                <input type="text" id="diag2" placeholder="Secondary Diagnosis..." oninput="showSuggestions(this, 'list2')" autocomplete="off">
                <div id="list2" class="suggest-panel"></div>
            </div>

            <button class="btn-analyze" onclick="handleAnalyze()">ANALYZE NOW <i data-lucide="zap" size="16"></i></button>

            <div id="result-display">
                <div id="match-status" style="color:white; border:1px solid rgba(255,255,255,0.4); padding:5px 15px; border-radius:30px; font-size:0.55rem; font-weight:900; margin-bottom:5px;"></div>
                <div class="res-code" id="resCode"></div>
                <div id="resNote" style="color: white; font-size: 0.75rem; margin: 15px 0; font-style: italic; opacity: 0.9;"></div>
                <button onclick="resetUI()" style="background:none; border:1px solid rgba(255,255,255,0.3); color:white; padding:10px 30px; border-radius:50px; cursor:pointer; font-weight:800; font-size:0.65rem;">NEW SEARCH</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div style="color: white; font-size: 0.55rem; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7;">Developed By: <b>maya</b></div>
        <a href="https://wa.me/YOUR_NUMBER?text=Hi%20ABC,%20I've%20got%20feedback%20for%20the%20ICD%20tool!" class="wa-link" target="_blank">
            <i data-lucide="message-circle" size="16"></i> FEEDBACK WHATSAPP
        </a>
        <div class="copyright-bar">© 2026 ICD LOGIC PRO • ALL RIGHTS RESERVED</div>
    </div>

    <script>
        lucide.createIcons();

        window.onload = () => {
            const toast = document.getElementById('welcome-toast');
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            }, 800);
        };

        function showSuggestions(input, listId) {
            const list = document.getElementById(listId);
            const val = input.value.toLowerCase().trim();
            list.innerHTML = '';
            if (!val || typeof allOptions === 'undefined') { list.style.display = 'none'; return; }
            const matches = allOptions.filter(o => o.toLowerCase().includes(val)).slice(0, 10);
            if (matches.length > 0) {
                list.style.display = 'block';
                matches.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'suggest-item';
                    item.innerText = m;
                    item.onmousedown = () => { input.value = m; list.style.display = 'none'; };
                    list.appendChild(item);
                });
            } else { list.style.display = 'none'; }
        }

        function handleAnalyze() {
            const v1 = document.getElementById('diag1').value.trim();
            const v2 = document.getElementById('diag2').value.trim();
            if(!v1 || !v2) return;
            const card = document.getElementById('mainCard');
            card.classList.add('searching');
            setTimeout(() => {
                card.classList.remove('searching');
                card.classList.add('active');
                const match = comboRules.find(r => (r.a === v1 && r.b === v2) || (r.b === v1 && r.a === v2));
                document.getElementById('resCode').innerText = match ? match.result : "N/A";
                document.getElementById('resNote').innerText = match ? match.note : "Separate coding required.";
                document.getElementById('match-status').innerText = match ? "MATCH FOUND" : "NO COMBINATION";
            }, 1000);
        }

        function resetUI() {
            const card = document.getElementById('mainCard');
            card.classList.remove('active', 'searching');
            document.getElementById('diag1').value = '';
            document.getElementById('diag2').value = '';
        }

        document.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.input-box')) {
                document.querySelectorAll('.suggest-panel').forEach(p => p.style.display = 'none');
            }
        });
    </script>
</body>
</html>
